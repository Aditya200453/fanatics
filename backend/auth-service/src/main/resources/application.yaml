server:
  port: 8191

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mariadb://localhost:3307/auth_db
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  # IMPORTANT: must be at least 32+ chars for HS256
  secret: "clinic-auth-secret-key-please-make-this-very-long-32chars"
  expiry-ms: 3600000

app:
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:3000"