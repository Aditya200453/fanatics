server:
  port: 8191

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mariadb://localhost:3307/clinic_auth
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
