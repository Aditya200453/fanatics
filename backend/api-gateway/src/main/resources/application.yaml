server:
  port: 8076

spring:
  main:
    web-application-type: reactive   # ✅ IMPORTANT

  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          routes:
            # ✅ AUTH SERVICE (PUBLIC)
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**

            # ✅ PROTECTED SERVICES
            - id: patient-service
              uri: lb://patient-service
              predicates:
                - Path=/patient/**

            - id: doctor-service
              uri: lb://doctor-service
              predicates:
                - Path=/doctor/**

            - id: appointment-service
              uri: lb://appointment-service
              predicates:
                - Path=/appointment/**

            - id: diagnostic-service
              uri: lb://diagnostic-service
              predicates:
                - Path=/diagnostic/**

            - id: prescription-service
              uri: lb://prescription-service
              predicates:
                - Path=/prescription/**

jwt:
  secret: clinic-auth-secret-key-please-make-this-very-long-32chars

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework.cloud.gateway: DEBUG