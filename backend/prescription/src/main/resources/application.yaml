debug: true

server:
  port: 8075

spring:
  application:
    name: prescription

  datasource:
    url: jdbc:mariadb://localhost:3307/cms
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    show-sql: true